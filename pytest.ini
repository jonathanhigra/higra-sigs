[pytest]
# Garante que a raiz do projeto está no PYTHONPATH
pythonpath = .

# Versão mínima do pytest
minversion = 6.0

# Opções padrão do pytest
addopts = -q -ra --maxfail=1 --disable-warnings

# Diretório onde ficam os testes
testpaths = backend/tests

# Diretórios que não devem entrar na descoberta
norecursedirs =
    .git
    .pytest_cache
    __pycache__
    backend/venv
    frontend/node_modules
    frontend/dist
    dist

# Arquivos de teste (padrão: test_*.py)
python_files = test_*.py

# Funções de teste
python_functions = test_*

# Classes de teste
python_classes = Test*

# Marcações personalizadas (para evitar warnings do pytest)
markers =
    slow: testes demorados
    integration: testes que dependem do backend ativo
    unit: testes unitários rápidos

# Tratamento de warnings
filterwarnings =
    ignore::DeprecationWarning
